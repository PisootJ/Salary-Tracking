// ─── FILTER STATE ────────────────────────────────────────────────────
const SF = { 5:{status:"all",type:"all"}, 7:{status:"all",type:"all"} };

function getStatus(step) {
  if (!step.subs || !step.subs.length) return step.status;
  if (step.subs.every(s=>s.status==='done')) return 'done';
  if (step.subs.some(s=>s.status==='done'||s.status==='active')) return 'active';
  return 'wait';
}
function badge(s){ return s==='done'?'เสร็จแล้ว':s==='active'?'กำลังดำเนินการ':'รอดำเนินการ'; }
function typeTag(t) {
  if (t==='สสอ.') return `<span class="type-tag tt-sso">สสอ.</span>`;
  if (t==='รพ.')  return `<span class="type-tag tt-rph">รพ.</span>`;
  return `<span class="type-tag tt-ssk">สสจ.</span>`;
}

function applyFilter(subs, sid) {
  const f = SF[sid];
  return subs.filter(s =>
    (f.status==='all' || s.status===f.status) &&
    (f.type==='all'   || s.type===f.type)
  );
}

function buildSubHtml(subs, sid) {
  const groups = ['สสอ.','รพ.','สสจ.'];
  const filtered = applyFilter(subs, sid);
  if (!filtered.length) return `<div class="no-result">ไม่พบข้อมูลที่กรอง</div>`;
  let h = '';
  groups.forEach(g => {
    const items = filtered.filter(s=>s.type===g);
    if (!items.length) return;
    h += `<div class="group-label">${g}</div>`;
    items.forEach(s => {
      const dimmed = s.status==='wait' ? ' dimmed' : '';
      const dates = s.dateReceive ? `${s.dateReceive}${s.dateSend?' → '+s.dateSend:''}` : '—';
      const daysH = s.days!=null ? `<span class="${s.status==='done'?'sub-days-ok':'sub-days-act'}">${s.days} วัน</span>` : '';
      const updH  = s.updatedBy ? `<span class="sub-upd">👤 ${s.updatedBy}</span>` : '';
      h += `<div class="sub-row">
        <div class="sub-dot ${s.status}"></div>
        ${typeTag(s.type)}
        <span class="sub-name${dimmed}">${s.name}</span>
        <span class="sub-dates">${dates}</span>
        ${daysH}${updH}
      </div>`;
    });
  });
  return h;
}

function updateSubSection(sid) {
  const key = document.getElementById('roundSelect').value;
  const step = DATA[key].steps.find(s=>s.id===sid);
  const wrap = document.getElementById(`sub-wrap-${sid}`);
  if (!wrap || !step) return;
  const shown = applyFilter(step.subs, sid).length;
  wrap.querySelector('.sub-count-tag').textContent = `แสดง ${shown}/${step.subs.length}`;
  wrap.querySelector('.sub-body').innerHTML = buildSubHtml(step.subs, sid);
}

function onSF(sid, field, val) {
  SF[sid][field] = val;
  updateSubSection(sid);
}

function toggleSub(sid, btn) {
  const wrap = document.getElementById(`sub-wrap-${sid}`);
  if (!wrap) return;
  const isOpen = wrap.classList.toggle('expanded');
  const arrow = btn.querySelector('.sub-toggle-arrow');
  if (arrow) arrow.classList.toggle('open', isOpen);
}

function renderAll() {
  SF[5] = {status:"all",type:"all"};
  SF[7] = {status:"all",type:"all"};

  const key = document.getElementById('roundSelect').value;
  const steps = DATA[key].steps;

  let dc=0,ac=0,wc=0,td=0;
  let activeStep = null;
  steps.forEach(s=>{ const st=getStatus(s); if(st==='done')dc++; else if(st==='active'){ ac++; if(!activeStep) activeStep=s; } else wc++; if(s.days)td+=s.days; });
  const pct = Math.round(dc/steps.length*100);

  document.getElementById('summaryCards').innerHTML = `
    <div class="card done"><div class="num">${dc}</div><div class="label">✅ เสร็จแล้ว</div></div>
    <div class="card active"><div class="label">⚡ ขั้นตอนปัจจุบัน</div><div class="step-name">${activeStep ? activeStep.name : "-"}</div></div>
    <div class="card wait"><div class="num">${wc}</div><div class="label">⬜ รอดำเนินการ</div></div>
    <div class="card days"><div class="num">${td}</div><div class="label">📅 วันรวม</div></div>`;
  document.getElementById('pPct').textContent = pct+'%';
  document.getElementById('pFill').style.width = pct+'%';

  let html = '';
  steps.forEach((step, idx) => {
    const st = getStatus(step);
    const isLast = idx === steps.length-1;
    const icon = st==='done' ? '✓' : step.id;

    let meta = '';
    if(step.dateReceive) meta += `<span class="meta-item">📥 ${step.dateReceive}</span>`;
    if(step.dateSend)    meta += `<span class="meta-item">📤 ${step.dateSend}</span>`;
    if(step.updatedBy)   meta += `<span class="meta-item">👤 ${step.updatedBy}</span>`;
    const resp = step.responsible ? `<span class="resp-tag">🏢 ${step.responsible}</span>` : '';
    const daysH = step.days!=null ? `<span class="days-badge">${step.days} วัน</span>` : '';
    const liveLabel = st==='active' ? '<div class="active-label">🔴 LIVE</div>' : '';

    // Sub section for step 5 & 7
    let subSec = '';
    if ((step.id===5||step.id===7) && step.subs && step.subs.length) {
      const subs = step.subs;
      const sid = step.id;
      const dc2 = subs.filter(s=>s.status==='done').length;
      const ac2 = subs.filter(s=>s.status==='active').length;
      const wc2 = subs.filter(s=>s.status==='wait').length;
      const ssoC = subs.filter(s=>s.type==='สสอ.').length;
      const rphC = subs.filter(s=>s.type==='รพ.').length;
      const sskC = subs.filter(s=>s.type==='สสจ.').length;
      const shown = applyFilter(subs, sid).length;

      subSec = `
        <button class="sub-toggle-btn" onclick="toggleSub(${sid},this)">
          <span>📋 รายละเอียดหน่วยงาน</span>
          <div class="sub-mini-summary" style="display:flex;gap:6px;margin:0;">
            <div class="mini-card mc-done">✅ ${dc2}</div>
            <div class="mini-card mc-active">⚡ ${ac2}</div>
            <div class="mini-card mc-wait">⬜ ${wc2}</div>
          </div>
          <span class="sub-toggle-arrow">▼</span>
        </button>
        <div class="sub-section" id="sub-wrap-${sid}">
          <div class="sub-filter-bar">
            <label>กรองสถานะ:</label>
            <select class="sub-filter-select" onchange="onSF(${sid},'status',this.value)">
              <option value="all">ทุกสถานะ (${subs.length})</option>
              <option value="done">✅ เสร็จแล้ว (${dc2})</option>
              <option value="active">⚡ กำลังดำเนินการ (${ac2})</option>
              <option value="wait">⬜ รอดำเนินการ (${wc2})</option>
            </select>
            <label>ประเภท:</label>
            <select class="sub-filter-select" onchange="onSF(${sid},'type',this.value)">
              <option value="all">ทุกประเภท (${subs.length})</option>
              <option value="สสอ.">สสอ. (${ssoC})</option>
              <option value="รพ.">รพ. (${rphC})</option>
              <option value="สสจ.">สสจ. (${sskC})</option>
            </select>
            <span class="sub-count-tag">แสดง ${shown}/${subs.length}</span>
          </div>
          <div class="sub-body">${buildSubHtml(subs, sid)}</div>
        </div>`;
    }

    html += `
      <div class="step-item">
        <div class="step-left">
          <div class="step-icon ${st}">${icon}</div>
          ${!isLast?`<div class="step-line${st==='done'?' done-line':''}"></div>`:''}
        </div>
        <div class="step-content ${st}">
          ${liveLabel}
          <div class="step-header">
            <span class="step-title">ขั้นตอน ${step.id} — ${step.name}</span>
            <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;">${daysH}<span class="step-badge badge-${st}">${badge(st)}</span></div>
          </div>
          ${(meta||resp)?`<div class="step-meta">${meta}${resp}</div>`:''}
          ${subSec}
        </div>
      </div>`;
  });

  document.getElementById('timeline').innerHTML = html;
}

renderAll();
</script>
